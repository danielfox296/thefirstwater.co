name: Deploy sound sessions site

on:
  push:
    branches: [main]
  # The events service fires this when sessions change, so the static site
  # rebuilds with fresh dates without a code push:
  #   POST /repos/<owner>/<repo>/dispatches  {"event_type": "sessions-updated"}
  repository_dispatch:
    types: [sessions-updated]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install jinja2 markdown Pillow pyyaml

      - name: Build site
        run: python3 build.py

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '_site' --exclude '_src' --exclude '.git' --exclude '.github' \
            --exclude 'scripts' --exclude '__pycache__' --exclude 'build.py' \
            --exclude '*.md' ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
