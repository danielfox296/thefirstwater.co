<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="{{canonical_url}}">
  <meta name="robots" content="{{robots}}">
  <title>{{title}}</title>
  {{meta_description}}
  <meta name="theme-color" content="#16130f">

  <!-- Open Graph -->
  {{og_tags}}

  <!-- Twitter Card -->
  {{twitter_tags}}

  <!-- Structured Data -->
  {{schema_json}}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap">
  <link rel="stylesheet" href="{{css_path}}styles.css">
  {{page_style}}
</head>
<body>
  {{header}}

  <main>
  {{content}}
  </main>

  {{footer}}

  <!-- Analytics: TODO — add GA4 or Plausible when property exists -->

  <script>
    // Navigation active state
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      if (link.href === window.location.href) {
        link.classList.add('active');
        link.setAttribute('aria-current', 'page');
      }
    });

    // Intersection Observer for fade-up animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.fade-up, .fade-in').forEach(el => observer.observe(el));

    // Mobile menu toggle
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    const navLinksEl = document.querySelector('.nav-links');
    if (menuToggle && navLinksEl) {
      menuToggle.addEventListener('click', () => {
        const isOpen = navLinksEl.classList.toggle('mobile-open');
        menuToggle.textContent = isOpen ? '✕' : '☰';
        menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    }

    // Accordion toggle
    document.querySelectorAll('.accordion-trigger').forEach(trigger => {
      trigger.addEventListener('click', () => {
        const accordion = trigger.parentElement;
        const isOpen = accordion.getAttribute('data-open') === 'true';
        accordion.setAttribute('data-open', isOpen ? 'false' : 'true');
        trigger.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      });
    });
  </script>
</body>
</html>
