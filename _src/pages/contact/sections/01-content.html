<section class="section section--dark hero-section page-hero">
  <div class="hero-media" aria-hidden="true">
    <img src="{{css_path}}img/hero/contact.jpg" alt="">
  </div>
  <div class="container">
    <span class="eyebrow">Contact</span>
    <h1 class="fade-up">Write to me</h1>
    <p class="hero-sub fade-up">Questions, venues, press, or a note. You'll hear back.</p>
  </div>
</section>

<section class="section section--light">
  <div class="container">
    <div class="hear-first" id="hear-first">
      <span class="eyebrow">Hear first</span>
      <p class="form-note">Leave your email and you will hear when the next session goes up.</p>
      <form class="contact-form hear-first-form" action="https://events.thefirstwater.co/subscribe" method="POST">
        <label class="form-field">
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <button type="submit" class="btn btn-primary">Hear first</button>
      </form>
    </div>

    <form class="contact-form" action="https://events.thefirstwater.co/inquiries" method="POST">
      <label class="form-field">
        <span>What is this about</span>
        <select name="event_type">
          <option>Booking a team or group</option>
          <option>A question</option>
          <option>Press or venues</option>
        </select>
      </label>
      <label class="form-field">
        <span>Name</span>
        <input type="text" name="name" autocomplete="name" required>
      </label>
      <label class="form-field">
        <span>Email</span>
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label class="form-field">
        <span>Message</span>
        <textarea name="message" rows="6" required></textarea>
      </label>
      <label class="form-check">
        <input type="checkbox" name="notify_next_session" value="yes">
        <span>Tell me when the next session goes up</span>
      </label>
      <button type="submit" class="btn btn-primary">Send</button>
    </form>
  </div>
</section>
