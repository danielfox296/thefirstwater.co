<section class="section section--dark blog-hero-section">
  <div class="container">
    <span class="eyebrow">Contact</span>
    <h1 style="font-weight:300;">Write to us</h1>
    <p class="hero-sub">Questions, venues, press, or a note. You'll hear back.</p>
  </div>
</section>

<section class="section section--light">
  <div class="container">
    <form class="contact-form" action="https://formspree.io/f/xgopwepl" method="POST">
      <input type="hidden" name="_subject" value="SOUND SESSIONS — contact form">
      <input type="hidden" name="venture" value="sound-sessions">
      <label class="form-field">
        <span>Name</span>
        <input type="text" name="name" autocomplete="name" required>
      </label>
      <label class="form-field">
        <span>Email</span>
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label class="form-field">
        <span>Message</span>
        <textarea name="message" rows="6" required></textarea>
      </label>
      <label class="form-check">
        <input type="checkbox" name="notify_next_session" value="yes">
        <span>Tell me when the next session goes up</span>
      </label>
      <button type="submit" class="btn btn-primary">Send</button>
    </form>
  </div>
</section>
