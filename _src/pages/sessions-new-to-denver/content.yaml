  - type: prose
    body: |
      A session for people who just moved here and know three people, two of them
      coworkers. Sound first, seventy-five minutes of it, and time after to meet
      the others who came for the same reason. This night is social on purpose
      and labeled that way.

  - type: prose
    body: |
      You come alone to this one, and so does almost everyone else. First date
      being set. [Write to me](../../contact/) and check the box, and you will
      hear first.

      [All sessions](../../sessions/)
