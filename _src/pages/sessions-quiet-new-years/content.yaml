sections:
  - type: prose
    body: |
      An alternative to the party. One night at the turn of the year for entering
      it rested and clear. You wake up on the first of January with the whole
      year ahead of you and nothing to recover from.

  - type: prose
    body: |
      One night only, each year. You spend the turn of the year on the floor
      instead of in the noise. [Write to me](../../contact/) and check the box,
      and you will hear when tickets go up.

      [All sessions](../../sessions/)
