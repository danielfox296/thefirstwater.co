sections:
  - type: prose
    body: |
      A session for people leaving a company, and for the teams they leave
      behind. A layoff lands in the body like any other ending, and most people
      go straight from the news to updating a resume without an hour in between.
      This is the hour in between.

  - type: prose
    body: |
      Usually an employer books this as part of a decent goodbye. If that could
      be your company, see [Corporate](../../corporate/). Occasionally we run it
      open; [write to us](../../contact/) and check the box to hear when.
