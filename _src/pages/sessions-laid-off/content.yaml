sections:
  - type: prose
    body: |
      A session for people leaving a company, and for the teams they leave
      behind. You feel a layoff the way you feel any other ending, and most people
      go straight from the news to updating a resume without an hour in between.
      This is the hour in between.

  - type: prose
    body: |
      Usually an employer books this as part of a decent goodbye. If that could
      be your company, see [Corporate](../../corporate/). You do not have to have
      your next move ready to be in this session. Occasionally I run it open;
      [write to me](../../contact/) and check the box to hear when.

      [All sessions](../../sessions/)
