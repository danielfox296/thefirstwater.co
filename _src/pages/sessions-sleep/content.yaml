      A recorded descent for the end of the day, produced with the same care as
      the live sessions: sub-bass placed for the chest, an arc built the way songs
      are built, and an ending designed to be slept through.

  - type: prose
    body: |
      It comes free to people on the email list, and it comes to them first. You
      listen to this one at home, in the dark, at the end of your own day.
      [Write to me](../../contact/) and check the box, and I send it to you.

