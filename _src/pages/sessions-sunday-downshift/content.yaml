sections:
  - type: prose
    body: |
      By Sunday evening you can already feel Monday. It starts around four or
      five: you notice the pull toward the week ahead, you run the list in your
      head, and you spend the last of the weekend bracing instead of resting.
      Maybe someone who loves you sent you this link, because they watch you do
      this every Sunday.

  - type: subhead
    text: "The night, plainly"

  - type: prose
    body: |
      This one is built for Sunday evenings: seventy-five minutes of engineered
      sound in a space in Denver, low light, a formal opening and a formal close.
      You lie down under blankets and you do nothing with the coming week for the
      length of it. You start Monday from a different floor than the one you would
      have started it from.

  - type: prose
    body: |
      Most people leave having actually stopped, some for the first time all week,
      and they carry a little of that stillness into Monday morning.

  - type: subhead
    text: "The first Sunday"

  - type: prose
    body: |
      This one becomes weekly once its space is set. [Write to me](../../contact/)
      and check the box, and you will hear when the first Sunday goes up.

