sections:
  - type: prose
    body: |
      A session for people carrying a death. A smaller space, fewer seats, and
      more time held at the quiet end of the night. You will not be asked to
      share, to speak, or to be anywhere but on the floor.

  - type: prose
    body: |
      This one is being built slowly, with the most care of anything on this
      site. If what you are carrying is the end of a relationship rather than a
      death, [Healing from Breakups](../healing-from-breakups/) is built for that.
      [Write to me](../../contact/) and check the box, and you will hear when it
      is ready.

      [All sessions](../../sessions/)
