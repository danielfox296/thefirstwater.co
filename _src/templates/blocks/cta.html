{% set variant = block.variant|default('default') %}
<aside class="blog-cta blog-cta--{{ variant }}">
  <div class="blog-cta__headline">{{ block.headline|safe }}</div>
  <div class="blog-cta__body">{{ block.body|safe }}</div>
  <a href="{{ block.link }}" class="blog-cta__link">{{ block.link_text }} &rarr;</a>
</aside>
